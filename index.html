<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIMBAS 37</title>
  <link rel="icon" href="https://img.icons8.com/color/96/000000/administrator-male.png" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a237e; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    .container { width: 100%; height: 100vh; display: flex; flex-direction: column; }
    .iframe-container { flex: 1; width: 100%; height: 100%; position: relative; }
    iframe { width: 100%; height: 100%; border: none; background: white; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; z-index: 10; }
    .spinner { border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid white; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Memuat aplikasi...</p>
    </div>
    <div class="iframe-container">
      <iframe id="appFrame" src="" allow="fullscreen; camera; microphone" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"></iframe>
    </div>
  </div>

  <script>
    // ==========================================
    // PENTING: GANTI DENGAN URL WEB APP ANDA
    // ==========================================
    const APP_URL = "https://script.google.com/macros/s/AKfycbwlX_ef4uMLrA2oQJ54Bfp6NMKmcPIKazbSIWwltpvNnsPhqkW1gzAvG5-Wbxpoe28T/exec";
    
    const appFrame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');
    
    function loadApp() {
      loading.style.display = 'block';
      
      // =============================================================
      // LOGIKA PEMBACA ID (INI YANG HILANG DI KODE ANDA SEBELUMNYA)
      // =============================================================
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id'); // Ambil ID dari address bar GitHub
      
      let targetUrl = APP_URL;
      
      if (id) {
        // Jika ada ID, tambahkan ke URL Google Script
        targetUrl += "?id=" + id;
        console.log("Meneruskan ID ke Iframe: " + id);
      }
      
      appFrame.src = targetUrl;
    }
    
    appFrame.addEventListener('load', function() {
      loading.style.display = 'none';
    });
    
    window.addEventListener('DOMContentLoaded', loadApp);
  </script>
</body>
</html>
